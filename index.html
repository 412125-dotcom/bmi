<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 健康計算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏數字輸入框的上下箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans bg-[conic-gradient(at_top_right,_var(--tw-gradient-stops))] from-indigo-50 via-slate-50 to-cyan-50 selection:bg-indigo-100">

    <!-- 裝飾性背景光暈 -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-300 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
    </div>

    <div class="relative z-10 bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] border border-white/50 p-6 sm:p-10 w-full max-w-md">
        
        <!-- 標題區塊 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-indigo-500 to-cyan-400 text-white shadow-lg shadow-indigo-200 mb-4 transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 3.82-13 1.5 1.5 0 0 0 2.18 2.06L11 9l4 4 2.94-3.94a1.5 1.5 0 0 0 2.06 2.18A22 22 0 0 1 7 20z"/></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-slate-800 to-slate-600 tracking-tight">
                BMI 健康計算器
            </h1>
            <p class="text-slate-500 mt-2 text-sm font-medium">了解您的身體質量指數</p>
        </div>
        
        <div class="space-y-6">
            <!-- 身高輸入框 -->
            <div class="group">
                <label for="height" class="block text-sm font-semibold text-slate-700 mb-2 ml-1">
                    身高 <span class="text-slate-400 font-normal">(公分)</span>
                </label>
                <div class="relative flex items-center">
                    <div class="absolute left-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></svg>
                    </div>
                    <input type="number" id="height" placeholder="例如: 175" class="w-full pl-12 pr-16 py-3.5 bg-slate-50 text-slate-800 text-lg font-medium rounded-2xl border-0 ring-1 ring-inset ring-slate-200 focus:ring-2 focus:ring-inset focus:ring-indigo-500 focus:bg-white transition-all outline-none"/>
                    <span class="absolute right-4 text-slate-400 font-medium select-none">cm</span>
                </div>
            </div>

            <!-- 體重輸入框 -->
            <div class="group">
                <label for="weight" class="block text-sm font-semibold text-slate-700 mb-2 ml-1">
                    體重 <span class="text-slate-400 font-normal">(公斤)</span>
                </label>
                <div class="relative flex items-center">
                    <div class="absolute left-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 19v-3"/><path d="M10 19v-3"/><path d="M14 19v-3"/><path d="M18 19v-3"/><path d="M8 11V9"/><path d="M16 11V9"/><path d="M12 4v-1"/><path d="M2 13h20"/><path d="M3 13a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2"/></svg>
                    </div>
                    <input type="number" id="weight" placeholder="例如: 70" class="w-full pl-12 pr-16 py-3.5 bg-slate-50 text-slate-800 text-lg font-medium rounded-2xl border-0 ring-1 ring-inset ring-slate-200 focus:ring-2 focus:ring-inset focus:ring-indigo-500 focus:bg-white transition-all outline-none"/>
                    <span class="absolute right-4 text-slate-400 font-medium select-none">kg</span>
                </div>
            </div>

            <!-- 錯誤訊息 -->
            <div id="error-container" class="hidden flex items-center text-rose-500 text-sm font-medium bg-rose-50 px-4 py-3 rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" class="mr-2 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span id="error-text"></span>
            </div>

            <!-- 按鈕區域：即時計算，因此改為只顯示重新輸入按鈕 -->
            <div id="reset-wrapper" class="pt-2 transition-all duration-300 opacity-0 h-0 overflow-hidden pointer-events-none">
                <button id="reset-btn" class="w-full flex items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3.5 px-4 rounded-2xl transition-all duration-200 mt-2" title="清除重新輸入">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    清除重新輸入
                </button>
            </div>
        </div>

        <!-- 結果顯示區域 -->
        <div id="result-section" class="hidden mt-6 overflow-hidden rounded-2xl ring-1 shadow-sm transition-all duration-500">
            <div class="p-6 relative">
                <!-- 裝飾線條 -->
                <div id="result-bar" class="absolute top-0 left-0 w-1 h-full"></div>
                
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-slate-500 text-sm font-semibold tracking-wider uppercase mb-1">您的 BMI 指數</h2>
                        <div class="flex items-baseline gap-2">
                            <span id="bmi-value" class="text-5xl font-black text-slate-800 tracking-tighter"></span>
                        </div>
                    </div>
                    <div id="bmi-label" class="px-4 py-2 rounded-xl font-bold text-sm bg-white/60 shadow-sm backdrop-blur-sm border border-white/40">
                        <!-- Label goes here -->
                    </div>
                </div>

                <div class="mt-6 pt-5 border-t border-slate-200/50">
                    <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-500 font-medium">健康體重範圍：</span>
                        <span id="ideal-range" class="font-bold text-slate-700"></span>
                    </div>
                    <div class="flex justify-between items-center text-sm mt-2">
                        <span class="text-slate-500 font-medium">體重調整建議：</span>
                        <span id="weight-suggestion" class="font-bold"></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- BMI 基準對照表 -->
        <div class="mt-8 pt-6 border-t border-slate-200/60">
            <h3 class="text-sm font-bold text-slate-600 mb-3 text-center tracking-wide">BMI 基準對照表</h3>
            <div class="overflow-hidden rounded-xl border border-slate-200/60 bg-white/40 backdrop-blur-sm">
                <table class="w-full text-xs text-left text-slate-600">
                    <thead class="bg-slate-100/50 text-slate-500">
                        <tr>
                            <th class="px-4 py-2.5 font-semibold">狀態</th>
                            <th class="px-4 py-2.5 font-semibold">BMI 範圍</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100/60">
                        <tr class="hover:bg-white/60 transition-colors">
                            <td class="px-4 py-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-sky-400"></span>體重過輕</td>
                            <td class="px-4 py-2 font-medium font-mono text-slate-500">&lt; 18.5</td>
                        </tr>
                        <tr class="hover:bg-white/60 transition-colors">
                            <td class="px-4 py-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-400"></span>正常範圍</td>
                            <td class="px-4 py-2 font-medium font-mono text-slate-500">18.5 - 23.9</td>
                        </tr>
                        <tr class="hover:bg-white/60 transition-colors">
                            <td class="px-4 py-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-amber-400"></span>過重</td>
                            <td class="px-4 py-2 font-medium font-mono text-slate-500">24.0 - 26.9</td>
                        </tr>
                        <tr class="hover:bg-white/60 transition-colors">
                            <td class="px-4 py-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-orange-500"></span>輕度肥胖</td>
                            <td class="px-4 py-2 font-medium font-mono text-slate-500">27.0 - 29.9</td>
                        </tr>
                        <tr class="hover:bg-white/60 transition-colors">
                            <td class="px-4 py-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-rose-500"></span>中度肥胖</td>
                            <td class="px-4 py-2 font-medium font-mono text-slate-500">30.0 - 34.9</td>
                        </tr>
                        <tr class="hover:bg-white/60 transition-colors">
                            <td class="px-4 py-2 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-red-600"></span>重度肥胖</td>
                            <td class="px-4 py-2 font-medium font-mono text-slate-500">&ge; 35.0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // DOM 元素選取
        const heightInput = document.getElementById('height');
        const weightInput = document.getElementById('weight');
        const errorContainer = document.getElementById('error-container');
        const errorText = document.getElementById('error-text');
        const resetWrapper = document.getElementById('reset-wrapper');
        const resetBtn = document.getElementById('reset-btn');
        const resultSection = document.getElementById('result-section');
        const resultBar = document.getElementById('result-bar');
        const bmiValueEl = document.getElementById('bmi-value');
        const bmiLabelEl = document.getElementById('bmi-label');
        const idealRangeEl = document.getElementById('ideal-range');
        const weightSuggestionEl = document.getElementById('weight-suggestion');

        // 台灣衛福部國健署 BMI 標準與對應的現代化色彩
        const getBmiCategory = (bmi) => {
            if (bmi < 18.5) return { label: '體重過輕', color: 'text-sky-600', bg: 'bg-sky-50', ring: 'ring-sky-200', bar: 'bg-sky-400' };
            if (bmi >= 18.5 && bmi < 24) return { label: '正常範圍', color: 'text-emerald-600', bg: 'bg-emerald-50', ring: 'ring-emerald-200', bar: 'bg-emerald-400' };
            if (bmi >= 24 && bmi < 27) return { label: '過重', color: 'text-amber-600', bg: 'bg-amber-50', ring: 'ring-amber-200', bar: 'bg-amber-400' };
            if (bmi >= 27 && bmi < 30) return { label: '輕度肥胖', color: 'text-orange-600', bg: 'bg-orange-50', ring: 'ring-orange-200', bar: 'bg-orange-500' };
            if (bmi >= 30 && bmi < 35) return { label: '中度肥胖', color: 'text-rose-600', bg: 'bg-rose-50', ring: 'ring-rose-200', bar: 'bg-rose-500' };
            return { label: '重度肥胖', color: 'text-red-700', bg: 'bg-red-50', ring: 'ring-red-300', bar: 'bg-red-600' };
        };

        const showError = (msg) => {
            errorText.textContent = msg;
            errorContainer.classList.remove('hidden');
            resultSection.classList.add('hidden');
        };

        const hideError = () => {
            errorContainer.classList.add('hidden');
        };

        const calculateBMI = () => {
            hideError();
            
            const heightVal = heightInput.value;
            const weightVal = weightInput.value;

            // 控制重置按鈕的顯示與隱藏
            if (heightVal || weightVal) {
                resetWrapper.className = "pt-2 transition-all duration-300 opacity-100 h-auto";
            } else {
                resetWrapper.className = "pt-2 transition-all duration-300 opacity-0 h-0 overflow-hidden pointer-events-none";
            }

            // 如果兩個都沒有輸入，清空結果
            if (!heightVal && !weightVal) {
                resultSection.classList.add('hidden');
                return;
            }

            const h = parseFloat(heightVal);
            const w = parseFloat(weightVal);

            // 如果輸入不完整或不是數字，暫不顯示結果與錯誤
            if (!heightVal || !weightVal || isNaN(h) || isNaN(w)) {
                resultSection.classList.add('hidden');
                return;
            }

            if (h <= 0 || w <= 0) {
                showError('請輸入大於 0 的數值！');
                return;
            }

            // 計算邏輯
            const heightInMeters = h / 100;
            const bmiValue = w / (heightInMeters * heightInMeters);
            const roundedBmi = Math.round(bmiValue * 10) / 10; 
            
            // 計算理想體重範圍 (18.5 ~ 24)
            const idealMin = Math.round(18.5 * heightInMeters * heightInMeters * 10) / 10;
            const idealMax = Math.round(23.9 * heightInMeters * heightInMeters * 10) / 10;

            // 計算建議調整的體重
            let weightSuggestion = '';
            if (roundedBmi < 18.5) {
                const gainNeeded = (idealMin - w).toFixed(1);
                weightSuggestion = `建議增加 ${gainNeeded} kg`;
            } else if (roundedBmi >= 24) {
                const loseNeeded = (w - idealMax).toFixed(1);
                weightSuggestion = `建議減少 ${loseNeeded} kg`;
            } else {
                weightSuggestion = '太棒了，請繼續保持！';
            }

            const category = getBmiCategory(roundedBmi);

            // 更新 DOM 元素與樣式
            bmiValueEl.textContent = roundedBmi.toFixed(1);
            bmiLabelEl.textContent = category.label;
            idealRangeEl.textContent = `${idealMin} ~ ${idealMax} kg`;
            weightSuggestionEl.textContent = weightSuggestion;

            // 更新動態類別 (覆蓋舊有的顏色樣式)
            resultSection.className = `mt-6 overflow-hidden rounded-2xl ring-1 shadow-sm transition-all duration-500 ${category.bg} ${category.ring}`;
            resultBar.className = `absolute top-0 left-0 w-1 h-full ${category.bar}`;
            bmiLabelEl.className = `px-4 py-2 rounded-xl font-bold text-sm bg-white/60 shadow-sm backdrop-blur-sm border border-white/40 ${category.color}`;
            weightSuggestionEl.className = `font-bold ${category.color}`;

            // 顯示結果區塊
            resultSection.classList.remove('hidden');
        };

        const resetForm = () => {
            heightInput.value = '';
            weightInput.value = '';
            hideError();
            resultSection.classList.add('hidden');
            resetWrapper.className = "pt-2 transition-all duration-300 opacity-0 h-0 overflow-hidden pointer-events-none";
        };

        // 綁定事件監聽器
        heightInput.addEventListener('input', calculateBMI);
        weightInput.addEventListener('input', calculateBMI);
        resetBtn.addEventListener('click', resetForm);

    </script>
</body>
</html>
